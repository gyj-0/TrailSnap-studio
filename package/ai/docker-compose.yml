version: '3.8'

services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trailsnap-ai
    ports:
      - "8001:8001"
    environment:
      - AI_ENV=production
      - AI_DEBUG=false
      - AI_PORT=8001
      - AI_DEVICE=auto
      - AI_GPU_ID=0
      - AI_LOG_LEVEL=INFO
      - AI_MODEL_CACHE_SIZE=3
      - AI_MODEL_IDLE_TIMEOUT=300
    volumes:
      # 模型文件挂载
      - ./models:/app/models
      # 日志目录
      - ./logs:/app/logs
      # 时区设置
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trailsnap-network

  # 可选：AI 服务监控
  ai-monitor:
    image: prom/prometheus:latest
    container_name: trailsnap-ai-monitor
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - trailsnap-network

networks:
  trailsnap-network:
    external: true
    name: trailsnap-network
